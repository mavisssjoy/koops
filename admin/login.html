<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — KOOPS Admin</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">KOOPS</div>
    <div class="login-sub">Panel Admin</div>

    <div id="errorMsg" style="display:none;background:#1a0a0a;border:0.5px solid #5a1a1a;color:#e24b4a;padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:1rem"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-input" placeholder="email@kamu.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" style="width:100%;margin-top:.5rem" id="loginBtn" onclick="doLogin()">Masuk</button>

    <div style="margin-top:1.5rem;text-align:center">
      <a href="../index.html" style="font-size:12px;color:var(--text3)">← Kembali ke KOOPS</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase.js"></script>
<script>
// Cek kalau sudah login
async function checkSession() {
  const { data } = await db.auth.getSession();
  if (data.session) location.href = 'dashboard.html';
}
checkSession();

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');

  if (!email || !password) { showError('Email dan password harus diisi.'); return; }

  btn.textContent = 'Masuk...';
  btn.disabled = true;
  err.style.display = 'none';

  const { error } = await db.auth.signInWithPassword({ email, password });

  if (error) {
    showError('Email atau password salah.');
    btn.textContent = 'Masuk';
    btn.disabled = false;
  } else {
    location.href = 'dashboard.html';
  }
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg;
  err.style.display = 'block';
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
