<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — KOOPS Admin</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">KOOPS</div>
    <div class="login-sub">// ADMIN_ACCESS</div>
    <div id="errorMsg" style="display:none;background:none;border:1px solid #e24b4a;color:#e24b4a;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.05em;margin-bottom:1rem;text-transform:uppercase"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-input" placeholder="EMAIL_ADDRESS" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-submit" style="margin-top:.5rem" id="loginBtn" onclick="doLogin()">ACCESS KOOPS →</button>
    <div style="margin-top:1.5rem;text-align:center">
      <a href="../index.html" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#444;letter-spacing:.05em;text-transform:uppercase">← BACK TO KOOPS</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase.js"></script>
<script>
async function checkSession() {
  const { data } = await db.auth.getSession();
  if (data.session) location.href = 'dashboard.html';
}
checkSession();

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  if (!email || !password) { showError('FILL ALL FIELDS.'); return; }
  btn.textContent = 'ACCESSING...';
  btn.disabled = true;
  err.style.display = 'none';
  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) {
    showError('INVALID CREDENTIALS.');
    btn.textContent = 'ACCESS KOOPS →';
    btn.disabled = false;
  } else {
    location.href = 'dashboard.html';
  }
}
function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg;
  err.style.display = 'block';
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
