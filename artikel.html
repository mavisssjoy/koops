<script>
function formatDate(d) {
  return new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
}
function readTime(content) {
  const words = content ? content.replace(/<[^>]+>/g,'').split(' ').length : 0;
  return Math.max(1, Math.ceil(words / 200)) + ' menit baca';
}

function shareWA(title, url) {
  window.open(`https://wa.me/?text=${encodeURIComponent(title + ' ' + url)}`, '_blank');
}
function shareX(title, url) {
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`, '_blank');
}

async function loadArticle() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) { location.href = 'index.html'; return; }

  const { data, error } = await db.from('articles').select('*').eq('id', id).single();
  if (error || !data) {
    document.getElementById('articleWrap').innerHTML = `<div class="empty-state"><p>Artikel tidak ditemukan.</p><a href="index.html" style="color:var(--orange);margin-top:1rem;display:inline-block">← Kembali</a></div>`;
    return;
  }

  document.title = `${data.title} — KOOPS`;
  // Update OG tags dynamically
  const ogImg = data.cover_url || "https://koopsmedia.vercel.app/og-image.png";
  const ogDesc = data.excerpt || data.content.replace(/<[^>]+>/g,"").slice(0,160);
  document.getElementById("ogTitle").content = data.title + " — KOOPS";
  document.getElementById("ogDesc").content = ogDesc;
  document.getElementById("ogImage").content = ogImg;
  document.getElementById("ogUrl").content = location.href;
  document.getElementById("twTitle").content = data.title + " — KOOPS";
  document.getElementById("twDesc").content = ogDesc;
  document.getElementById("twImage").content = ogImg;
  const url = location.href;

  // Update OG tags dinamis
  const excerpt = data.excerpt || data.content.replace(/<[^>]+>/g,'').slice(0,150);
  const img = data.cover_url || 'https://koopsmedia.vercel.app/og-image.jpg';
  document.getElementById('ogTitle').setAttribute('content', data.title + ' — KOOPS');
  document.getElementById('ogDesc').setAttribute('content', excerpt);
  document.getElementById('ogImage').setAttribute('content', img);
  document.getElementById('ogUrl').setAttribute('content', url);
  document.getElementById('twTitle').setAttribute('content', data.title + ' — KOOPS');
  document.getElementById('twDesc').setAttribute('content', excerpt);
  document.getElementById('twImage').setAttribute('content', img);
  document.getElementById('metaDesc').setAttribute('content', excerpt);

  const coverHTML = data.cover_url
    ? `<img src="${data.cover_url}" class="article-cover-full" alt="${data.title}">`
    : `<div class="article-cover-full-placeholder"></div>`;

  document.getElementById('articleWrap').innerHTML = `
    <a href="javascript:history.back()" class="back-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Kembali
    </a>
    ${coverHTML}
    <div class="article-body">
      <div class="category-badge">${data.category}</div>
      <h1>${data.title}</h1>
      <div class="article-meta">
        <span>Redaksi Koops</span>
        <span>${formatDate(data.created_at)}</span>
        <span>${readTime(data.content)}</span>
      </div>
      <hr class="article-divider">
      <div class="article-content">${data.content}</div>
      <div class="share-section">
        <div class="share-label">Bagikan artikel ini</div>
        <div class="share-buttons">
          <button class="share-btn share-wa" onclick="shareWA('${data.title.replace(/'/g,"\\'")}','${url}')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp
          </button>
          <button class="share-btn share-x" onclick="shareX('${data.title.replace(/'/g,"\\'")}','${url}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Twitter/X
          </button>
        </div>
      </div>
    </div>`;

  const { data: related } = await db.from('articles').select('*').eq('status','terbit')
    .eq('category', data.category).neq('id', id).limit(3).order('created_at',{ascending:false});

  if (related && related.length) {
    document.getElementById('relatedSection').style.display = 'block';
    document.getElementById('relatedGrid').innerHTML = related.map(a => `
      <a href="artikel.html?id=${a.id}" class="article-card">
        ${a.cover_url ? `<img src="${a.cover_url}" class="card-cover" alt="${a.title}" loading="lazy">` : `<div class="card-cover-placeholder"></div>`}
        <div class="card-cat">${a.category}</div>
        <div class="card-title">${a.title}</div>
        <div class="card-meta">${new Date(a.created_at).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}</div>
      </a>`).join('');
  }
}

function closeMenu() {
  document.getElementById('sideMenu').classList.remove('open');
  document.getElementById('menuOverlay').classList.remove('open');
}
document.getElementById('hamburgerBtn').onclick = () => {
  document.getElementById('sideMenu').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('open');
};

loadArticle();
</script>
