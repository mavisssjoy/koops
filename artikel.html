<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artikel — KOOPS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text3);
      padding: 1rem 2rem;
      transition: color .15s;
    }
    .back-link:hover { color: var(--orange); }
    .related-section { padding: 2rem 0; border-top: 0.5px solid var(--border); margin-top: 2rem; }
    .related-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 1.5rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="nav-logo">KOOPS</a>
    <ul class="nav-links">
      <li><a href="kategori.html?k=Budaya">Budaya</a></li>
      <li><a href="kategori.html?k=Politik">Politik</a></li>
      <li><a href="kategori.html?k=Street">Street</a></li>
      <li><a href="kategori.html?k=Musik">Musik</a></li>
      <li><a href="kategori.html?k=Sport">Sport</a></li>
      <li><a href="kategori.html?k=Film">Film</a></li>
    </ul>
  </div>
</nav>

<div id="articleWrap">
  <div class="loading" style="padding:4rem;text-align:center">Memuat artikel...</div>
</div>

<div class="container">
  <div class="related-section" id="relatedSection" style="display:none">
    <div class="related-title">Baca Juga</div>
    <div class="article-grid" id="relatedGrid"></div>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo">KOOPS</div>
    <ul class="footer-links">
      <li><a href="#">Tentang</a></li>
      <li><a href="#">Kontak</a></li>
      <li><a href="#">Instagram</a></li>
    </ul>
    <span class="footer-copy">© 2026 KOOPS</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
function formatDate(d) {
  return new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
}
function readTime(content) {
  const words = content ? content.replace(/<[^>]+>/g,'').split(' ').length : 0;
  return Math.max(1, Math.ceil(words / 200)) + ' menit baca';
}

async function loadArticle() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) { location.href = 'index.html'; return; }

  const { data, error } = await db.from('articles').select('*').eq('id', id).single();
  if (error || !data) {
    document.getElementById('articleWrap').innerHTML = `<div class="empty-state"><p>Artikel tidak ditemukan.</p><a href="index.html" style="color:var(--orange);margin-top:1rem;display:inline-block">← Kembali ke Beranda</a></div>`;
    return;
  }

  document.title = `${data.title} — KOOPS`;

  const coverHTML = data.cover_url
    ? `<img src="${data.cover_url}" class="article-cover-full" alt="${data.title}">`
    : `<div class="article-cover-full-placeholder"></div>`;

  document.getElementById('articleWrap').innerHTML = `
    <a href="javascript:history.back()" class="back-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Kembali
    </a>
    ${coverHTML}
    <div class="article-body">
      <div class="category-badge">${data.category}</div>
      <h1>${data.title}</h1>
      <div class="article-meta">
        <span>Redaksi Koops</span>
        <span>${formatDate(data.created_at)}</span>
        <span>${readTime(data.content)}</span>
      </div>
      <hr class="article-divider">
      <div class="article-content">${data.content}</div>
    </div>`;

  // Load related
  const { data: related } = await db.from('articles')
    .select('*').eq('status','terbit').eq('category', data.category)
    .neq('id', id).limit(3).order('created_at',{ascending:false});

  if (related && related.length) {
    document.getElementById('relatedSection').style.display = 'block';
    document.getElementById('relatedGrid').innerHTML = related.map(a => `
      <div class="article-card" onclick="location.href='artikel.html?id=${a.id}'">
        ${a.cover_url ? `<img src="${a.cover_url}" class="card-cover" alt="${a.title}" loading="lazy">` : `<div class="card-cover-placeholder"></div>`}
        <div class="card-cat">${a.category}</div>
        <div class="card-title">${a.title}</div>
        <div class="card-meta">${formatDate(a.created_at)}</div>
      </div>`).join('');
  }
}

loadArticle();
</script>
</body>
</html>
